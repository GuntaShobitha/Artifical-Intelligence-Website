<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Page not found — Stackly AI"/>
  <title>404 — Page Not Found | Stackly AI</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:    #020617;
      --bg-secondary:  #0a0f1e;
      --accent-blue:   #2563eb;
      --accent-violet: #7c3aed;
      --accent-cyan:   #06b6d4;
      --accent-green:  #10b981;
      --text-primary:  #f1f5f9;
      --text-secondary:#94a3b8;
      --text-muted:    #475569;
      --border-subtle: rgba(255,255,255,0.06);
      --border-glow:   rgba(37,99,235,0.35);
      --gradient-primary: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      --font-display:  'Inter', system-ui, sans-serif;
      --font-body:     'Inter', system-ui, sans-serif;
      --font-mono:     'JetBrains Mono', 'Fira Code', monospace;
      --radius-md:     12px;
      --radius-lg:     20px;
      --radius-pill:   999px;
      --transition:    0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Animated grid background ── */
    .hero-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.07) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridShift 20s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes gridShift {
      0%   { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }

    /* ── Glow orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
      z-index: 0;
    }
    .orb-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(37,99,235,0.18) 0%, transparent 70%);
      top: -200px; left: 50%;
      transform: translateX(-50%);
      animation: orbFloat1 8s ease-in-out infinite;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      animation: orbFloat2 10s ease-in-out infinite;
    }
    .orb-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%);
      top: 40%; left: -80px;
      animation: orbFloat3 12s ease-in-out infinite;
    }
    @keyframes orbFloat1 {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-30px); }
    }
    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(-20px, -40px); }
    }
    @keyframes orbFloat3 {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(30px); }
    }

    /* ── Particles canvas ── */
    #particle-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.6;
    }

    /* ── Neural network canvas ── */
    #neural-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.25;
    }

    /* ── Main layout ── */
    .page-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 760px;
      padding: 40px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      will-change: transform;
    }

    /* ── Logo ── */
    .nav-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease both;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: var(--gradient-primary);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 0 20px rgba(37,99,235,0.5);
    }
    .logo-text {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .logo-text span { background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    /* ── 404 Giant Number ── */
    .error-number {
      font-size: clamp(8rem, 22vw, 16rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      animation: fadeUp 0.7s 0.1s ease both, pulseGlow 4s 1s ease-in-out infinite;
      filter: drop-shadow(0 0 60px rgba(37,99,235,0.35));
      user-select: none;
    }
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 40px rgba(37,99,235,0.3)); }
      50%       { filter: drop-shadow(0 0 80px rgba(124,58,237,0.5)); }
    }

    /* Glitch layers */
    .error-number::before,
    .error-number::after {
      content: '404';
      position: absolute;
      inset: 0;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .error-number::before {
      animation: glitch1 5s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
      transform: translate(-3px, 0);
    }
    .error-number::after {
      animation: glitch2 5s infinite;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
      transform: translate(3px, 0);
      background: linear-gradient(135deg, #06b6d4 0%, #7c3aed 100%);
    }
    @keyframes glitch1 {
      0%, 90%, 100% { transform: translate(-3px, 0); opacity: 0; }
      92%            { transform: translate(-6px, -2px); opacity: 0.7; }
      94%            { transform: translate(4px, 1px);  opacity: 0.5; }
      96%            { transform: translate(-3px, 0);   opacity: 0; }
    }
    @keyframes glitch2 {
      0%, 90%, 100% { transform: translate(3px, 0); opacity: 0; }
      92%            { transform: translate(6px, 2px);  opacity: 0.7; }
      94%            { transform: translate(-4px, -1px);opacity: 0.5; }
      96%            { transform: translate(3px, 0);    opacity: 0; }
    }

    /* ── Glass card ── */
    .glass-card {
      background: rgba(10, 15, 30, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(37,99,235,0.2);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      width: 100%;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 32px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(37,99,235,0.08) inset;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    /* ── Status badge ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(37,99,235,0.12);
      border: 1px solid rgba(37,99,235,0.3);
      border-radius: var(--radius-pill);
      padding: 6px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent-cyan);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: var(--font-mono);
      margin-bottom: 24px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent-cyan);
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent-cyan); }
      50%       { opacity: 0.3; box-shadow: none; }
    }

    /* ── Typography ── */
    .error-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      margin-bottom: 16px;
      animation: fadeUp 0.8s 0.3s ease both;
    }
    .error-subtitle {
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      color: var(--text-secondary);
      line-height: 1.7;
      max-width: 520px;
      margin: 0 auto 40px;
      animation: fadeUp 0.8s 0.4s ease both;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
      animation: fadeUp 0.8s 0.5s ease both;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: var(--radius-pill);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      transition: var(--transition);
      border: none;
      position: relative;
      overflow: hidden;
    }
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:hover::after { opacity: 0.07; }

    .btn-primary {
      background: var(--gradient-primary);
      color: #fff;
      box-shadow: 0 0 30px rgba(37,99,235,0.4), 0 4px 16px rgba(0,0,0,0.3);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(37,99,235,0.6), 0 8px 24px rgba(0,0,0,0.4);
    }
    .btn-outline {
      background: rgba(255,255,255,0.04);
      color: var(--text-primary);
      border: 1px solid rgba(255,255,255,0.14);
    }
    .btn-outline:hover {
      transform: translateY(-2px);
      border-color: rgba(37,99,235,0.5);
      box-shadow: 0 0 20px rgba(37,99,235,0.2);
      background: rgba(37,99,235,0.08);
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border-subtle);
      margin: 0 0 32px;
    }

    /* ── Quick links ── */
    .quick-links-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: var(--font-mono);
      margin-bottom: 16px;
    }
    .quick-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.8s 0.6s ease both;
    }
    .quick-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      font-size: 0.8rem;
      text-decoration: none;
      transition: var(--transition);
    }
    .quick-link:hover {
      color: var(--text-primary);
      border-color: rgba(37,99,235,0.4);
      background: rgba(37,99,235,0.08);
      transform: translateY(-1px);
    }

    /* ── Error code strip ── */
    .error-meta {
      margin-top: 36px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      animation: fadeUp 0.8s 0.7s ease both;
    }
    .error-meta span {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .error-meta strong { color: var(--text-secondary); }

    /* ── Fade-up keyframe ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .glass-card { padding: 32px 20px; }
      .btn-row    { flex-direction: column; align-items: stretch; }
      .btn        { text-align: center; }
    }
  </style>
</head>
<body>

<!-- Backgrounds -->
<div class="hero-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<canvas id="neural-canvas"></canvas>
<canvas id="particle-canvas"></canvas>

<!-- Main content -->
<main class="page-wrapper" id="content">

  <!-- Logo -->
      <a href="index.html" class="nav-logo"><img src="./images/logo-dark.webp" alt="STACKLY Logo" class="nav-logo-img" /></a>
  <!-- 404 number -->
  <div class="error-number" aria-hidden="true">404</div>

  <!-- Glass card -->
  <div class="glass-card">

    <!-- Status badge -->
    <div class="status-badge">
      <span class="status-dot"></span>
      Error · HTTP 404
    </div>

    <h1 class="error-title">Page Not Found</h1>

    <p class="error-subtitle">
      The page you're looking for doesn't exist, was moved, or is currently unavailable.
      Let's get you back on track.
    </p>

    <!-- CTAs -->
    <div class="btn-row">
      <a href="index.html" class="btn btn-primary">← Back to Home</a>
      <button onclick="history.back()" class="btn btn-outline">Go Back</button>
    </div>

    <div class="divider"></div>

    <!-- Quick links -->
    <p class="quick-links-label">Helpful Links</p>
    <nav class="quick-links">
      <a href="index.html"   class="quick-link">🏠 Home</a>
      <a href="about.html"   class="quick-link">🏢 About</a>
      <a href="services.html" class="quick-link">⚙️ Services</a>
      <a href="contact.html" class="quick-link">📬 Contact</a>
    </nav>

    <!-- Meta strip -->
    <div class="error-meta">
      <span>🕐 <strong id="ts"></strong></span>
      <span>⚡ <strong>stacklyai.com</strong></span>
      <span>📡 <strong>Status: Investigating</strong></span>
    </div>

  </div>
</main>

<script>
/* ── Timestamp ── */
const ts = document.getElementById('ts');
function updateTs() {
  ts.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
updateTs();
setInterval(updateTs, 1000);

/* ── Neural network canvas ── */
(function() {
  const canvas = document.getElementById('neural-canvas');
  const ctx = canvas.getContext('2d');
  let nodes = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function initNodes() {
    nodes = [];
    const count = Math.floor((window.innerWidth * window.innerHeight) / 28000);
    for (let i = 0; i < count; i++) {
      nodes.push({
        x:  Math.random() * window.innerWidth,
        y:  Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.4,
        vy: (Math.random() - 0.5) * 0.4,
        r:  Math.random() * 2 + 1,
        pulse: Math.random() * Math.PI * 2
      });
    }
  }
  initNodes();
  window.addEventListener('resize', initNodes);

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() / 1000;

    nodes.forEach(n => {
      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > canvas.width)  n.vx *= -1;
      if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
    });

    // Edges
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const maxDist = 160;
        if (dist < maxDist) {
          const alpha = (1 - dist / maxDist) * 0.35;
          const grad = ctx.createLinearGradient(nodes[i].x, nodes[i].y, nodes[j].x, nodes[j].y);
          grad.addColorStop(0, `rgba(37,99,235,${alpha})`);
          grad.addColorStop(1, `rgba(124,58,237,${alpha})`);
          ctx.strokeStyle = grad;
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.stroke();
        }
      }
    }

    // Nodes
    nodes.forEach(n => {
      n.pulse += 0.02;
      const glowR = n.r + Math.sin(n.pulse) * 1.5;
      const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowR * 6);
      grd.addColorStop(0, 'rgba(37,99,235,0.7)');
      grd.addColorStop(1, 'rgba(37,99,235,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(n.x, n.y, glowR * 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = `rgba(180,210,255,0.9)`;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── Floating particles ── */
(function() {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function initParticles() {
    particles = [];
    const count = 24;
    for (let i = 0; i < count; i++) {
      particles.push({
        x:    Math.random() * window.innerWidth,
        y:    Math.random() * window.innerHeight,
        size: Math.random() * 2.5 + 0.5,
        speedY: -(Math.random() * 0.6 + 0.2),
        speedX: (Math.random() - 0.5) * 0.3,
        opacity: Math.random() * 0.5 + 0.1,
        hue:   Math.random() > 0.5 ? '37,99,235' : '124,58,237'
      });
    }
  }
  initParticles();

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.y += p.speedY;
      p.x += p.speedX;
      p.opacity -= 0.001;
      if (p.y < -10 || p.opacity <= 0) {
        p.y = canvas.height + 10;
        p.x = Math.random() * canvas.width;
        p.opacity = Math.random() * 0.5 + 0.1;
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${p.hue},${p.opacity})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── Mouse parallax ── */
(function() {
  const content = document.getElementById('content');
  let mx = 0, my = 0, cx = 0, cy = 0;
  window.addEventListener('mousemove', e => {
    mx = (e.clientX / window.innerWidth  - 0.5) * 18;
    my = (e.clientY / window.innerHeight - 0.5) * 12;
  });
  function tick() {
    cx += (mx - cx) * 0.06;
    cy += (my - cy) * 0.06;
    content.style.transform = `translate(${cx}px, ${cy}px)`;
    requestAnimationFrame(tick);
  }
  tick();
})();
</script>
</body>
</html>
